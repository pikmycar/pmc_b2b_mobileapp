name: pikmycar
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management (BLoC)
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  
  # API & Networking
  http: ^1.3.0
  google_api_headers: ^4.4.3

  # UI Components & Styling
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  pin_code_fields: ^8.0.1
  flutter_spinkit: ^5.2.1
  font_awesome_flutter: ^10.8.0

  # Device Features & Location
  connectivity_plus: ^6.1.3
  image_picker: ^1.1.2
  google_maps_flutter: ^2.14.2
  geocoding: ^3.0.0
  geolocator: ^14.0.0
  google_places_flutter: ^2.1.1
  permission_handler: ^12.0.0+1

  # Local Storage & Utils
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  dio: ^5.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/Png/
    - assets/Svg/
    - assets/Svg/HomepageIcons/
